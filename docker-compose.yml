services:
  devin-autofix:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  data:
